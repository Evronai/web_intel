// ════════════════════════════════════════
//  MAIN RUN (UPDATED: treat contact info block as contact page)
// ════════════════════════════════════════
async function run() {
  const url      = document.getElementById('urlInput').value.trim();
  const dsKey    = document.getElementById('deepseekKey').value.trim();
  const serpKey  = document.getElementById('serpKey').value.trim();
  const industry = document.getElementById('industryInput').value.trim();
  const region   = document.getElementById('regionInput').value.trim();
  const comp1    = document.getElementById('comp1').value.trim();
  const comp2    = document.getElementById('comp2').value.trim();
  const btn      = document.getElementById('runBtn');
  const loadCard = document.getElementById('loadCard');
  const resCard  = document.getElementById('resCard');

  hideErr();

  if (!url)   { showErr('Please enter a URL.'); return; }
  if (!dsKey) { showErr('Please enter your DeepSeek API key.'); return; }
  if (!url.startsWith('http')) { showErr('URL must start with http:// or https://'); return; }

  const cached = getCache(url);
  if (cached) { display(cached, url, true); return; }

  btn.disabled = true;
  resCard.style.display  = 'none';
  loadCard.style.display = 'block';
  setProgress(0, 'Starting…', '');
  setStages([
    { l: 'Fetch website',   s: 'active' },
    { l: 'Extract content', s: '' },
    { l: 'AI analysis',     s: '' },
    { l: 'Build report',    s: '' },
  ]);

  const enabled = Object.keys(mods).filter(k => mods[k]);

  try {
    setProgress(5, 'Fetching website…', 'Connecting to target');
    const html = await fetchSite(url);

    setProgress(15, 'Fetching additional pages…', 'Contact, About — checking NAP signals');
    setStages([
      { l: 'Fetch website',   s: 'done' },
      { l: 'Extract content', s: 'active' },
      { l: 'AI analysis',     s: '' },
      { l: 'Build report',    s: '' },
    ]);

    const { m, body } = extractContent(html);

    const origin  = new URL(url).origin;
    const subPageSlugs = [
      '/contact', '/contact-us', '/contactus', '/contact/', '/contact-us/',
      '/about', '/about-us', '/aboutus',
      '/store', '/locations', '/find-us', '/visit-us', '/hours', '/reach-out'
    ];
    const linkedPages = [...html.matchAll(/href=["']([^"']*?)["']/gi)]
      .map(match => match[1])
      .filter(href => /contact|about|store|location|find|visit|hours|reach/i.test(href))
      .map(href => {
        try {
          const u = new URL(href, url);
          return u.origin === origin ? u.href : null;
        } catch { return null; }
      })
      .filter(Boolean)
      .slice(0, 5);

    const pagesToCheck = [...new Set([
      ...subPageSlugs.map(s => origin + s),
      ...linkedPages,
    ])].slice(0, 5);

    const subPageResults = await Promise.allSettled(
      pagesToCheck.map(async (pageUrl) => {
        try {
          const pageHtml = await fetchSite(pageUrl);
          const extracted = extractContent(pageHtml);
          return { ...extracted, pageUrl, success: true };
        } catch { return { pageUrl, success: false }; }
      })
    );

    const subPageData = subPageResults
      .filter(r => r.status === 'fulfilled' && r.value?.success)
      .map(r => r.value);

    const allPages = [{ m, body, pageUrl: url }, ...subPageData];

    const failedSubPages = subPageResults
      .filter(r => r.status === 'fulfilled' && r.value && !r.value.success)
      .map(r => r.value.pageUrl)
      .filter(Boolean);
    const successfulSubPages = subPageData.map(p => p.pageUrl);
    const contactPagesCrawled = allPages
      .filter(p => /contact|about|store|location/i.test(p.pageUrl || ''))
      .map(p => ({
        url: p.pageUrl,
        hasAddress: p.m?.hasAddress || false,
        hasPhone:   p.m?.hasPhone   || false,
      }));

    const contactLinkExists = /href=["'][^"']*contact[^"']*/i.test(html);
    const aboutLinkExists   = /href=["'][^"']*about[^"']*/i.test(html);

    // ---------- UPDATED: compute hasContactInfoBlock first ----------
    const hasContactInfoBlock = allPages.some(p => p.m?.hasContactInfoBlock);
    const hasLocationHint     = allPages.some(p => p.m?.hasLocationHint);

    const merged = {
      hasAddress:          allPages.some(p => p.m?.hasAddress),
      hasPhone:            allPages.some(p => p.m?.hasPhone),
      hasLocalBiz:         allPages.some(p => p.m?.hasLocalBiz),
      hasFAQ:              allPages.some(p => p.m?.hasFAQ),
      hasSchema:           allPages.some(p => p.m?.hasSchema),
      // CONTACT PAGE IS CONSIDERED PRESENT IF:
      // - we actually fetched a contact page, OR
      // - a contact link exists in navigation, OR
      // - a contact info block (e.g., footer) was detected
      hasContactPage:      contactPagesCrawled.length > 0 || contactLinkExists || hasContactInfoBlock,
      hasContactInfoBlock: hasContactInfoBlock,
      hasLocationHint:     hasLocationHint,
      contactPageFetched:  contactPagesCrawled.length > 0,
      contactLinkInNav:    contactLinkExists,
      aboutLinkInNav:      aboutLinkExists,
      failedPages:         failedSubPages,
      contactPagesDetail:  contactPagesCrawled,
      pagesWithContact:    allPages.filter(p => p.m?.hasAddress || p.m?.hasPhone).length,
      crawledPages:        allPages.length,
      pagesFetched:        [url, ...successfulSubPages],
      pagesAttempted:      pagesToCheck.length + 1,
    };

    setProgress(20, 'Extracting content…', `Analysed ${merged.crawledPages} pages`);

    // Build structured context (updated description for contact page)
    const ctx = [
      `URL: ${url}`,
      `HTTPS: ${url.startsWith('https') ? 'yes' : 'no'}`,
      `Industry: ${industry || 'not specified'}`,
      `Region/Market: ${region || 'not specified'}`,
      `Data source: ${m.fromJina ? 'Jina.ai JS-rendered (fully accurate — dynamic content included)' : 'HTML proxy (static only — JS-rendered content may be missing)'}`,
      `Title: ${m.title || 'none'} (${m.title.length} chars)`,
      `Meta description: ${m.description || 'none'} (${m.description.length} chars)`,
      `Canonical: ${m.canonical || 'none'}`,
      `OG title: ${m.ogTitle || 'none'}`,
      `Robots: ${m.robots || 'none'}`,
      `H1: ${m.h1} | H2: ${m.h2} | H3: ${m.h3}`,
      `Images: ${m.imgs} total, ${m.imgsAlt} with alt text`,
      `Links: ${m.links}`,
      `Schema markup (any page): ${merged.hasSchema ? 'yes' : 'no'}`,
      `LocalBusiness schema (any page): ${merged.hasLocalBiz ? 'yes' : 'no'}`,
      `Physical address found (any page): ${merged.hasAddress ? 'YES — street/postal address detected' : (merged.contactLinkInNav && (m.isJSRendered || !merged.contactPageFetched)) ? 'UNKNOWN — contact page exists but content is JavaScript-rendered. Address may be present but could not be verified.' : 'NO — no physical address found on any crawled page'}`,
      `Phone found (any page): ${merged.hasPhone ? 'YES — phone number detected' : (merged.contactLinkInNav && (m.isJSRendered || !merged.contactPageFetched)) ? 'UNKNOWN — contact page exists but content is JavaScript-rendered. Phone may be present but could not be verified.' : 'NO — not found on any crawled page'}`,
      `Contact page exists: ${merged.hasContactPage ? 'YES' : 'NO'} (${merged.contactPageFetched ? 'fetched' : (merged.hasContactInfoBlock ? 'inferred from contact info block' : (merged.contactLinkInNav ? 'link in navigation but not fetched' : 'not found') )})`,
      `Contact info block detected (any page): ${merged.hasContactInfoBlock ? 'YES — contact information section found' : 'NO'}`,
      `Location hint (city/country) detected: ${merged.hasLocationHint ? 'YES — city/country mentioned' : 'NO'}`,
      `FAQ content (any page): ${merged.hasFAQ ? 'yes' : 'no'}`,
      `Pages with contact info: ${merged.pagesWithContact} of ${merged.crawledPages}`,
      `Viewport meta: ${m.hasViewport ? 'yes' : 'no'}`,
      `CSP meta tag: ${m.hasCSP ? 'yes' : 'no'}`,
      `Detected libraries: ${m.libs.join(', ') || 'none'}`,
      `JS rendered: ${m.isJSRendered ? 'yes' : 'no'}`,
      `Visible word count (homepage): ${m.bodyWordCount}`,
      `Page text excerpt (homepage): ${body}`,
    ].join('\n');

    setProgress(30, 'Running AI analysis…', `${enabled.length} modules + GEO check in parallel`);
    setStages([
      { l: 'Fetch website',   s: 'done' },
      { l: 'Extract content', s: 'done' },
      { l: 'AI analysis',     s: 'active' },
      { l: 'Build report',    s: '' },
    ]);

    const SYS = `You are an expert digital analyst producing reports for a professional consultancy. Respond ONLY with valid JSON matching the exact schema. No prose, no markdown fences, no explanation — raw JSON only.`;
    const tasks = {};

    const RUBRIC = `Scoring rubric (be accurate, never inflate): 85-100=excellent (industry best practice), 70-84=good (minor gaps), 50-69=needs improvement (meaningful issues), 30-49=poor (significant problems), 0-29=critical (major failures).${industry ? ` Benchmark scores against typical ${industry} industry standards.` : ''}`;
    const siteDomain = url.replace(/^https?:\/\/(www\.)?/,'').split('/')[0];
    const ACCURACY_RULE = `ACCURACY RULE: Only recommend fixing things that are genuinely absent or broken based on the data provided. Do NOT recommend adding something already confirmed present in the data. The data covers ${merged.crawledPages} crawled pages.`;

    // Security module (unchanged)
    if (mods.security) tasks.security = callDS(SYS, `Analyse this website for security issues.\n${ctx}\n\n${RUBRIC}\n${ACCURACY_RULE}\n\nReturn ONLY:\n{"score":<0-100>,"criticalIssues":<n>,"hasCSP":<bool>,"outdatedLibs":[<strings>],"industryBenchmark":"<how this score compares to typical ${industry||'similar'} sites>","summary":"<3-4 sentences: what works, what is critical, specific site context — not generic>","recommendations":[{"issue":"<specific issue>","fix":"<actionable fix>","businessImpact":"<plain English: what this costs the business>"},...]}`, dsKey, 900);

    // SEO module (unchanged)
    if (mods.seo) tasks.seo = callDS(SYS, `Analyse this website for technical SEO.\n${ctx}\n\n${RUBRIC}\n${ACCURACY_RULE}\n\nReturn ONLY:\n{"score":<0-100>,"issues":<n>,"titleLength":<n>,"metaLength":<n>,"h1Count":<n>,"h2Count":<n>,"totalImages":<n>,"imagesWithAlt":<n>,"hasSchema":<bool>,"hasCanonical":<bool>,"industryBenchmark":"<how this score compares to typical ${industry||'similar'} sites>","summary":"<3-4 sentences: what works, biggest gaps, specific findings — reference actual title/meta content>","recommendations":[{"issue":"<specific issue>","fix":"<actionable fix>","businessImpact":"<plain English: what this costs the business>"},...]}`, dsKey, 900);

    // AI Search module (unchanged)
    if (mods.aiSearch) tasks.aiSearch = callDS(SYS, `Analyse this website for AI search engine optimisation (ChatGPT, Perplexity, Google AI Overviews).\n${ctx}\n\n${RUBRIC}\n${ACCURACY_RULE}\n\nReturn ONLY:\n{"score":<0-100>,"optimizationGap":<0-100>,"conversationalScore":<0-100>,"questionScore":<0-100>,"snippetPotential":<0-100>,"hasFAQ":<bool>,"industryBenchmark":"<how this score compares to typical ${industry||'similar'} sites>","summary":"<3-4 sentences: specific AI search readiness assessment, what content types are missing, opportunity size>","recommendations":[{"issue":"<specific issue>","fix":"<actionable fix>","businessImpact":"<plain English: what this costs the business>"},...]}`, dsKey, 900);

    // Local module (updated prompt to reflect contact info block = contact page)
    if (mods.local) tasks.local = callDS(SYS,
      `Analyse this website for local SEO signals. Region: ${region || 'not specified'}.\n${ctx}\n\n${RUBRIC}\n\nCRITICAL ACCURACY RULES:\n1. "Physical address found" means a street/postal address was detected. If false, the site may still have contact information (phone, email, contact form) without a physical location.\n2. "Contact info block detected" indicates the site provides contact details (phone, email) even if no physical address is present.\n3. If "Contact page exists" is YES (either from fetched page, link, or contact info block), never recommend adding a contact page.\n4. If phone is YES but address is NO, do NOT recommend adding an address unless it is genuinely required for the business model.\n5. Only recommend adding NAP data if status is explicitly "NO — not found". UNKNOWN means unverifiable, not absent.\n6. For businesses that operate online-only, a missing physical address is not necessarily a problem.\n7. A "location hint" (city/country) is not a physical address.\n\nReturn ONLY:\n{"score":<0-100>,"napConsistency":"<Consistent|Inconsistent|Not fully verifiable>","localKeywords":<n>,"hasGBP":<bool>,"citations":<estimated n>,"hasLocalSchema":<bool>,"hasAddress":${merged.hasAddress},"hasPhone":${merged.hasPhone},"hasContactPage":${merged.hasContactPage},"industryBenchmark":"<benchmark>","summary":"<3-4 sentences — honest about JS-rendering limitations>","recommendations":[{"issue":"<only confirmed absent issues — nothing marked UNKNOWN>","fix":"<specific fix>","businessImpact":"<impact>"},...]}`,
      dsKey, 900);

    // Verified facts string (update to reflect contact page detection)
    const dataFromJina = m.fromJina;
    const phoneVerified   = merged.hasPhone || dataFromJina || (!merged.contactLinkInNav);
    const addressVerified = merged.hasAddress || dataFromJina || (!merged.contactLinkInNav);
    const verifiedFacts = [
      `Data source: ${dataFromJina ? 'Jina.ai JS-rendered — all content is accurate' : 'HTML proxy — JS-rendered content may be missing'}`,
      `HTTPS: confirmed ${url.startsWith('https') ? 'yes' : 'no'}`,
      `Meta description: ${m.description ? `confirmed present (${m.description.length} chars)` : 'confirmed MISSING'}`,
      `Title tag: "${m.title || 'none'}" (${m.title?.length || 0} chars — ${(m.title?.length >= 30 && m.title?.length <= 60) ? 'good length' : 'needs improvement'})`,
      `Schema markup: confirmed ${merged.hasSchema ? 'present' : 'absent'}`,
      `LocalBusiness schema: confirmed ${merged.hasLocalBiz ? 'present' : 'absent — confirmed missing'}`,
      `H1 count: ${m.h1} (${m.h1 === 1 ? 'correct' : m.h1 === 0 ? 'missing' : 'too many'})`,
      `Images with alt text: ${m.imgsAlt}/${m.imgs}`,
      `Canonical tag: ${m.canonical ? 'present' : 'missing'}`,
      `CSP header: ${m.hasCSP ? 'present' : 'missing'}`,
      `Detected libraries: ${m.libs.join(', ') || 'none'}`,
      `Contact page: confirmed ${merged.hasContactPage ? 'present' : 'absent'} (${merged.hasContactInfoBlock ? 'via contact info block' : (merged.contactLinkInNav ? 'link exists' : 'no link')})`,
      phoneVerified
        ? `Phone: confirmed ${merged.hasPhone ? 'present' : 'absent'}`
        : `Phone: NOT VERIFIED — site uses JS rendering and contact page content was not accessible. Make NO claims about phone presence or absence.`,
      addressVerified
        ? `Address: confirmed ${merged.hasAddress ? 'present (street/postal)' : 'absent'}`
        : `Address: NOT VERIFIED — site uses JS rendering and contact page content was not accessible. Make NO claims about address presence or absence.`,
      `Contact info block: ${merged.hasContactInfoBlock ? 'confirmed present' : 'not detected'}`,
      `Location hint (city/country): ${merged.hasLocationHint ? 'present' : 'not detected'}`,
    ].filter(Boolean).join('\n');

    const jsRendered = !dataFromJina && (m.isJSRendered || merged.contactLinkInNav);

    // Executive summary (unchanged, but now receives correct contact page status)
    tasks.execSummary = callDS(SYS,
      `Write an executive summary for a website intelligence report for ${siteDomain}.\nIndustry: ${industry || 'not specified'}. Region: ${region || 'not specified'}.\n\nYou MUST base your narrative ONLY on the verified facts below. Do not infer, assume, or hallucinate anything not explicitly stated.\n\nVERIFIED FACTS:\n${verifiedFacts}\n\nRULES:\n- Only mention phone/address if they appear in VERIFIED FACTS as confirmed present or absent\n- If the NOTE about JavaScript rendering is present, make NO claims about phone or address whatsoever\n- Only reference what is confirmed. Silence on unverifiable items is required.\n\nReturn ONLY:\n{"headline":"<one sentence verdict based only on verified facts>","narrative":"<3-5 sentences covering only confirmed findings — what works, what is confirmed missing, business impact>","topPriority":"<highest-ROI fix for a confirmed missing item>"}`,
      dsKey, 700).then(r => {
        if (jsRendered && !merged.hasPhone && !merged.hasAddress) {
          try {
            const parsed = JSON.parse(r.text.replace(/^```(?:json)?\s*/i,'').replace(/\s*```\s*$/,'').trim());
            const strip = (s) => s
              .replace(/,?\s*(absence of|missing|no|lacks?)\s+(a\s+)?(phone\s+number|address|physical address|street address)[^,.;]*/gi, '')
              .replace(/,?\s*(phone\s+number|address|physical address)\s+(is\s+)?(missing|absent|not\s+present|not\s+found)[^,.;]*/gi, '')
              .replace(/,?\s*(includes?|has|with|provides?)\s+(a\s+)?(phone\s+number|physical address|address information)[^,.;]*/gi, '')
              .replace(/\s{2,}/g, ' ').trim();
            parsed.headline = strip(parsed.headline);
            parsed.narrative = strip(parsed.narrative);
            parsed.topPriority = parsed.topPriority?.includes('phone') ? 'Add a compelling, keyword-rich meta description to improve search visibility and click-through rates' : parsed.topPriority;
            return { ...r, text: JSON.stringify(parsed) };
          } catch { return r; }
        }
        return r;
      });

    const serpPromise = serpKey ? callSerpAPI(url, serpKey) : Promise.resolve(null);
    const geoPromise = serpKey ? callGEO(url, serpKey, industry, region, m.title) : Promise.resolve(null);
    const compUrls = [comp1, comp2].filter(u => u && u.startsWith('http'));
    const compPromises = compUrls.map(async (cUrl) => {
      try {
        const cHtml = await fetchSite(cUrl);
        const { m: cm } = extractContent(cHtml);
        const cCtx = `URL: ${cUrl}\nTitle: ${cm.title}\nH1: ${cm.h1}|H2: ${cm.h2}\nSchema: ${cm.hasSchema}\nMeta desc: ${cm.description.length} chars\nVisible words: ${cm.bodyWordCount}\nLibs: ${cm.libs.join(',')||'none'}`;
        const cRes = await callDS(SYS,
          `Score this website across 4 dimensions. Be consistent with scores you gave the main site.\n${cCtx}\n\n${RUBRIC}\n\nReturn ONLY:\n{"url":"${cUrl}","security":<0-100>,"seo":<0-100>,"aiSearch":<0-100>,"local":<0-100>,"overall":<avg>,"topStrength":"<one thing they do better>","topWeakness":"<one thing they do worse>"}`,
          dsKey, 400);
        return parseJSON(cRes.text);
      } catch { return null; }
    });

    let serpData = null;
    const [settled, serpResult, geoResult, ...compResults] = await Promise.all([
      Promise.allSettled(
        Object.entries(tasks).map(async ([key, p]) => {
          const r = await p;
          const parsed = parseJSON(r.text);
          return { key, parsed, tokens: r.tokens, rawText: r.text };
        })
      ),
      serpPromise.catch(e => { showErr('SerpAPI: ' + e.message); return null; }),
      geoPromise.catch(e => { console.warn('GEO:', e.message); return null; }),
      ...compPromises,
    ]);
    serpData = serpResult;

    setProgress(90, 'Building report…', '');
    setStages([
      { l: 'Fetch website',   s: 'done' },
      { l: 'Extract content', s: 'done' },
      { l: 'AI analysis',     s: 'done' },
      { l: 'Build report',    s: 'active' },
    ]);

    const analysisData = { totalTokens: 0, serpData, geoData: geoResult, meta: { ...m, merged, crawledPages: merged.crawledPages }, tokenBreakdown: {}, competitors: compResults.filter(Boolean), industry, region };
    let parseFailures = 0;
    settled.forEach(s => {
      if (s.status === 'fulfilled' && s.value?.parsed) {
        analysisData[s.value.key] = s.value.parsed;
        analysisData.totalTokens += s.value.tokens || 0;
        analysisData.tokenBreakdown[s.value.key] = s.value.tokens || 0;
      } else if (s.status === 'fulfilled') {
        parseFailures++;
        console.warn('Module parse failed:', s.value?.key, '— raw text:', s.value?.rawText?.substring(0,200));
      } else {
        parseFailures++;
        console.warn('Module rejected:', s.reason);
      }
    });

    if (parseFailures === enabled.length) {
      throw new Error('AI returned responses that could not be parsed. Check your DeepSeek API key has credits and try again.');
    }

    // Merge ground-truth values (unchanged)
    if (analysisData.security) analysisData.security.hasCSP = m.hasCSP;
    if (analysisData.seo) {
      if (m.title) analysisData.seo.titleLength = m.title.length;
      if (m.description !== undefined) analysisData.seo.metaLength = m.description.length;
      analysisData.seo.h1Count = m.h1;
      analysisData.seo.h2Count = m.h2;
      analysisData.seo.totalImages = m.imgs;
      analysisData.seo.imagesWithAlt = m.imgsAlt;
      analysisData.seo.hasSchema = m.hasSchema;
      analysisData.seo.hasCanonical = !!m.canonical;
    }
    if (analysisData.aiSearch) analysisData.aiSearch.hasFAQ = m.hasFAQ;
    if (analysisData.local) analysisData.local.hasLocalSchema = m.hasLocalBiz;

    setCache(url, analysisData);

    if (!HISTORY.has(siteDomain)) HISTORY.set(siteDomain, []);
    const overallNow = [analysisData.security?.score, analysisData.seo?.score, analysisData.aiSearch?.score, analysisData.local?.score].filter(Number.isFinite);
    if (overallNow.length) {
      HISTORY.get(siteDomain).push({
        ts: Date.now(),
        overall: Math.round(overallNow.reduce((a,b)=>a+b,0)/overallNow.length),
        sec:   analysisData.security?.score  ?? null,
        seo:   analysisData.seo?.score       ?? null,
        ai:    analysisData.aiSearch?.score  ?? null,
        local: analysisData.local?.score     ?? null,
      });
      if (HISTORY.get(siteDomain).length > 10) HISTORY.set(siteDomain, HISTORY.get(siteDomain).slice(-10));
    }

    setProgress(100, 'Analysis complete!', '');
    setTimeout(() => {
      loadCard.style.display = 'none';
      display(analysisData, url, false);
    }, 350);

  } catch (e) {
    loadCard.style.display = 'none';
    showErr(e.message || 'Analysis failed. Please try again.');
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') run(); });
loadBranding();

function savePDF() {
  // ... same as before ...
}
</script>
